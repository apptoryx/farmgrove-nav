<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Farm Grove Site Navigation</title>

  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

  <style>
    :root{
      --bg: rgba(255,255,255,.96);
      --stroke: rgba(0,0,0,.08);
      --shadow: 0 16px 45px rgba(0,0,0,.18);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *{box-sizing:border-box}
    html, body{margin:0; padding:0; height:100%;}
    body{
      font-family: Inter, Arial, sans-serif;
      overflow:hidden;
      background:#f5f5f5;
    }

    #map{
      position:absolute;
      inset:0;
      width:100%;
      height:100dvh;
    }

    .panel{
      position:absolute;
      top:10px;
      left:10px;
      right:10px;
      background:var(--bg);
      border:1px solid var(--stroke);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      padding:12px;
      border-radius:18px;
      box-shadow:var(--shadow);
      max-width:1100px;
      margin:0 auto;
      animation:slideDown .35s ease-out;
      z-index:20;
      transition: bottom .25s ease, transform .25s ease, padding .25s ease;
    }

    .panel.dropdown-open{
      transform: translateY(-70px);
    }

    @keyframes slideDown{
      from{transform:translateY(-8px);opacity:0;}
      to{transform:translateY(0);opacity:1;}
    }

    .topRow{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:space-between;
    }

    .brand{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .badge{
      padding:8px 13px;
      border-radius:999px;
      color:#fff;
      font-weight:800;
      font-size:12px;
      letter-spacing:.3px;
      background:linear-gradient(135deg,#111,#3a3a3a);
      white-space:nowrap;
    }

    .status{
      font-size:16px;
      font-weight:900;
      line-height:1.2;
    }

    .muted{
      color:#666;
      font-weight:800;
    }

    .chip{
      padding:8px 11px;
      border-radius:999px;
      background:rgba(0,0,0,.06);
      font-size:13px;
      font-weight:800;
      white-space:nowrap;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:flex-start;
      margin-top:12px;
    }

    .searchWrap{
      position:relative;
      flex:1;
      min-width:340px;
    }

    input{
      width:100%;
      min-width:220px;
      padding:14px 14px;
      border:1px solid rgba(0,0,0,.15);
      border-radius:14px;
      font-size:16px;
      outline:none;
      background:#fff;
    }

    input:focus{
      border-color:rgba(0,0,0,.35);
    }

    .dropdown{
      position:absolute;
      top:calc(100% + 6px);
      left:0;
      right:0;
      max-height:260px;
      overflow:auto;
      background:rgba(255,255,255,.98);
      border:1px solid rgba(0,0,0,.10);
      border-radius:14px;
      box-shadow:0 18px 40px rgba(0,0,0,.20);
      z-index:50;
      display:none;
    }

    .dropdown.show{
      display:block;
    }

    .dropdown-item{
      padding:12px 14px;
      border-bottom:1px solid rgba(0,0,0,.06);
      cursor:pointer;
      font-size:15px;
      font-weight:700;
      background:#fff;
    }

    .dropdown-item:last-child{
      border-bottom:none;
    }

    .dropdown-item:hover,
    .dropdown-item.active{
      background:#f3f7ff;
    }

    .dropdown-empty{
      padding:12px 14px;
      color:#666;
      font-size:14px;
    }

    button{
      padding:14px 16px;
      border:0;
      border-radius:14px;
      color:#fff;
      font-weight:900;
      font-size:15px;
      background:linear-gradient(135deg,#111,#2b2b2b);
      cursor:pointer;
      transition:transform .08s ease, opacity .15s ease;
      min-height:48px;
    }

    button:active{transform:scale(.98);}
    button.secondary{background:linear-gradient(135deg,#555,#777);}
    button.navigateBtn{
      background:linear-gradient(135deg,#0b7cff,#0062d9);
    }
    button:disabled{
      opacity:.5;
      cursor:not-allowed;
    }

    .footerRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:12px;
    }

    .toggle{
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:12px;
      background:rgba(0,0,0,.06);
      font-size:12px;
      font-weight:900;
      user-select:none;
    }

    .toggle input{
      width:16px;
      height:16px;
      margin:0;
      min-width:auto;
      padding:0;
    }

    .hint{
      font-size:12px;
      color:#444;
      margin-top:10px;
      line-height:1.4;
    }

    .you-marker{
      position:relative;
      width:54px;
      height:72px;
      transform:translate(-50%,-100%);
      pointer-events:none;
    }

    .you-marker .pulse{
      position:absolute;
      left:50%;
      top:18px;
      width:52px;
      height:52px;
      transform:translateX(-50%);
      border-radius:999px;
      background:rgba(0,140,255,.18);
      animation:pulse 1.3s ease-out infinite;
    }

    .you-marker .dot{
      position:absolute;
      left:50%;
      top:18px;
      width:34px;
      height:34px;
      transform:translateX(-50%);
      border-radius:999px;
      background:rgba(0,140,255,1);
      border:3px solid white;
      box-shadow:0 12px 22px rgba(0,0,0,.25);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      line-height:1;
    }

    .you-marker .label{
      position:absolute;
      left:50%;
      top:56px;
      transform:translateX(-50%);
      background:rgba(255,255,255,.97);
      color:#111;
      font-weight:900;
      font-size:13px;
      padding:7px 12px;
      border-radius:999px;
      white-space:nowrap;
      border:1px solid rgba(0,0,0,.12);
      box-shadow:0 12px 22px rgba(0,0,0,.18);
    }

    @keyframes pulse{
      0%{transform:translateX(-50%) scale(.55);opacity:.55;}
      100%{transform:translateX(-50%) scale(1.35);opacity:0;}
    }

    .sel-ring{
      width:44px;
      height:44px;
      border-radius:999px;
      transform:translate(-50%,-50%);
      border:4px solid rgba(255,59,48,.95);
      box-shadow:0 0 0 10px rgba(255,59,48,.18);
      background:rgba(0,0,0,0);
      animation:ringPulse 1.1s ease-in-out infinite;
      pointer-events:none;
    }

    @keyframes ringPulse{
      0%{transform:translate(-50%,-50%) scale(.92);}
      50%{transform:translate(-50%,-50%) scale(1.05);}
      100%{transform:translate(-50%,-50%) scale(.92);}
    }

    @media (max-width: 768px){
      .panel{
        bottom:calc(8px + var(--safe-bottom));
        top:auto;
        left:8px;
        right:8px;
        padding:9px 10px;
        border-radius:18px;
      }

      .panel.dropdown-open{
        transform: translateY(-85px);
      }

      .topRow{
        gap:7px;
        align-items:flex-start;
      }

      .brand{
        gap:7px;
      }

      .status{
        font-size:14px;
      }

      .chip{
        font-size:11px;
        padding:7px 8px;
      }

      .row{
        display:grid;
        grid-template-columns:1fr 1fr 1fr;
        gap:8px;
      }

      .searchWrap{
        grid-column:1 / -1;
        min-width:100%;
      }

      input{
        padding:12px 12px;
        font-size:15px;
        border-radius:13px;
      }

      button{
        width:100%;
        padding:12px 8px;
        font-size:14px;
        min-height:44px;
        border-radius:13px;
      }

      .footerRow{
        justify-content:space-between;
        gap:8px;
        margin-top:10px;
      }

      .toggle{
        flex:1;
        justify-content:center;
        min-height:40px;
        font-size:11px;
        padding:7px 8px;
      }

      .hint{
        font-size:10px;
        margin-top:7px;
      }

      .dropdown{
        max-height:175px;
        border-radius:12px;
      }

      .dropdown-item{
        padding:11px 12px;
        font-size:14px;
      }

      .you-marker{
        width:62px;
        height:82px;
      }

      .you-marker .pulse{
        width:58px;
        height:58px;
      }

      .you-marker .dot{
        width:38px;
        height:38px;
        font-size:18px;
      }

      .you-marker .label{
        top:62px;
        font-size:13px;
        padding:7px 12px;
      }
    }

    @media (max-width: 420px){
      .status{font-size:13px;}
      .badge{font-size:11px;padding:7px 10px;}
      .chip{font-size:11px;padding:7px 8px;}
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div id="controlPanel" class="panel">
    <div class="topRow">
      <div class="brand">
        <span class="badge">FARM GROVE</span>
        <span class="status">GPS Nearest: <span id="nearestPlot" class="muted">Detecting…</span></span>
        <span id="distanceChip" class="chip">Distance: — m</span>
      </div>
      <div class="chip" id="gpsStatus">GPS: …</div>
    </div>

    <div class="row">
      <div class="searchWrap">
        <input
          id="plotSearch"
          placeholder="Select or type Plot ID / Area"
          autocomplete="off"
        />
        <div id="plotDropdown" class="dropdown"></div>
      </div>

      <button id="searchBtn">Search</button>
      <button id="clearBtn" class="secondary">Clear</button>
      <button id="navigateBtn" class="navigateBtn" disabled>Navigate</button>
    </div>

    <div class="footerRow">
      <label class="toggle"><input type="checkbox" id="autoRotate" checked /> 3D Rotate</label>
      <label class="toggle"><input type="checkbox" id="followMe" checked /> Follow Me</label>
    </div>

    <div class="hint">
      Scan QR → allow location → search plot/area → tap Navigate for Google Maps direction.
    </div>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
